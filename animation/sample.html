<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transition Example</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background-color:#f2f2f2;
        }

        .box{
            width:200px;
            height:100px;
            background-color:red;
            transition:
                background-color 2s ease-in-out 0s,
                border-radius 2s ease-in-out 2s,
                transform 2s ease-in-out 0s,
                width 2s ease-in-out 0s,
                height 2s ease-in-out 0s;
        }

        .box:hover{
            background-color:blue;
            border-radius:50%;
            transform:rotate(360deg);
            width:300px;
            height:300px;
        }
    </style>
</head>

<body>

    <div class="box"></div>

</body>
</html>
